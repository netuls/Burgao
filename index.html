<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burguerão — Cardápio Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#FFF9F0;}

.hero{background:#FF4B2B;padding:28px 20px 20px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:#FFD93D;border-radius:50%;opacity:0.4;}
.hero::after{content:'';position:absolute;bottom:-20px;left:-20px;width:80px;height:80px;background:#FF6B6B;border-radius:50%;opacity:0.3;}
.logo{font-family:'Fredoka One',cursive;font-size:36px;color:#fff;letter-spacing:1px;position:relative;z-index:1;}
.logo span{color:#FFD93D;}
.tagline{font-size:13px;color:rgba(255,255,255,0.85);margin-top:4px;font-weight:600;letter-spacing:2px;text-transform:uppercase;position:relative;z-index:1;}

.categories{display:flex;gap:10px;padding:18px 16px 10px;overflow-x:auto;scrollbar-width:none;}
.categories::-webkit-scrollbar{display:none;}
.cat-btn{border:none;border-radius:50px;padding:9px 18px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;background:#fff;color:#888;border:2px solid #eee;}
.cat-btn.active{color:#fff;border-color:transparent;}
.cat-btn[data-cat="burgers"].active{background:#FF4B2B;}
.cat-btn[data-cat="porcoes"].active{background:#FF9500;}
.cat-btn[data-cat="bebidas"].active{background:#00B4D8;}
.cat-btn[data-cat="sobremesas"].active{background:#FF6B9D;}

.section-title{font-family:'Fredoka One',cursive;font-size:22px;padding:8px 16px 4px;color:#222;}
.items-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:8px 16px;}
.item-card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.07);cursor:pointer;transition:transform .15s;}
.item-card:active{transform:scale(0.97);}
.item-img{width:100%;height:110px;display:flex;align-items:center;justify-content:center;font-size:52px;}
.item-img.burgers{background:linear-gradient(135deg,#FFF3E0,#FFE0B2);}
.item-img.porcoes{background:linear-gradient(135deg,#FFF8E1,#FFF0C2);}
.item-img.bebidas{background:linear-gradient(135deg,#E3F2FD,#BBDEFB);}
.item-img.sobremesas{background:linear-gradient(135deg,#FCE4EC,#F8BBD0);}
.item-info{padding:10px 12px 12px;}
.item-name{font-size:13px;font-weight:800;color:#222;line-height:1.3;}
.item-desc{font-size:11px;color:#999;margin-top:3px;line-height:1.4;}
.item-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.item-price{font-family:'Fredoka One',cursive;font-size:16px;color:#FF4B2B;}
.add-btn{width:28px;height:28px;border-radius:50%;border:none;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-weight:700;line-height:1;transition:transform .1s;}
.add-btn:active{transform:scale(0.9);}

.cart-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#FF4B2B;color:#fff;border:none;border-radius:50px;padding:14px 28px;font-family:'Fredoka One',cursive;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(255,75,43,0.4);transition:all .3s;width:calc(100% - 32px);max-width:400px;justify-content:space-between;}
.cart-bar.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(20px);}
.cart-total{background:rgba(255,255,255,0.25);border-radius:20px;padding:4px 12px;font-size:14px;}
.badge{background:#FFD93D;color:#333;border-radius:50%;width:20px;height:20px;font-size:11px;display:inline-flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-weight:800;}
.menu-wrap{padding-bottom:80px;}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:20px;transform:translateY(100%);transition:transform .3s;}
.overlay.open .sheet{transform:translateY(0);}
.sheet-handle{width:40px;height:4px;background:#eee;border-radius:2px;margin:0 auto 16px;}
.sheet-title{font-family:'Fredoka One',cursive;font-size:22px;color:#222;margin-bottom:4px;}
.sheet-subtitle{font-size:13px;color:#999;margin-bottom:20px;}

/* CART ITEMS */
.cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f0;}
.cart-item-emoji{font-size:32px;width:48px;text-align:center;}
.cart-item-info{flex:1;}
.cart-item-name{font-size:14px;font-weight:800;color:#222;}
.cart-item-price{font-size:13px;color:#FF4B2B;font-weight:700;margin-top:2px;}
.cart-item-qty{display:flex;align-items:center;gap:8px;margin-top:6px;}
.qty-btn{width:24px;height:24px;border-radius:50%;border:2px solid #eee;background:#fff;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#555;}
.qty-num{font-size:14px;font-weight:800;min-width:20px;text-align:center;}
.cart-item-remove{color:#ccc;font-size:20px;cursor:pointer;padding:4px;}

/* TOTAL */
.total-row{display:flex;justify-content:space-between;align-items:center;padding:16px 0 8px;}
.total-label{font-size:16px;font-weight:700;color:#555;}
.total-value{font-family:'Fredoka One',cursive;font-size:24px;color:#FF4B2B;}

/* PAGAMENTO */
.pay-title{font-size:14px;font-weight:800;color:#222;margin:12px 0 10px;}
.pay-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.pay-opt{border:2px solid #eee;border-radius:14px;padding:10px;cursor:pointer;text-align:center;transition:all .2s;background:#fff;}
.pay-opt.selected{border-color:#FF4B2B;background:#FFF5F3;}
.pay-opt-icon{font-size:24px;display:block;margin-bottom:4px;}
.pay-opt-label{font-size:12px;font-weight:700;color:#444;}
.pay-opt.selected .pay-opt-label{color:#FF4B2B;}

/* NOME */
.input-label{font-size:13px;font-weight:700;color:#555;margin-bottom:6px;display:block;}
.input-field{width:100%;border:2px solid #eee;border-radius:12px;padding:12px 14px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:border .2s;margin-bottom:14px;}
.input-field:focus{border-color:#FF4B2B;}

/* BOTÃO FINALIZAR */
.btn-finalizar{width:100%;background:#FF4B2B;color:#fff;border:none;border-radius:50px;padding:16px;font-family:'Fredoka One',cursive;font-size:18px;cursor:pointer;margin-top:4px;transition:transform .1s, opacity .1s;}
.btn-finalizar:active{transform:scale(0.98);opacity:0.9;}
.btn-finalizar:disabled{background:#ccc;cursor:not-allowed;}

/* SUCESSO */
.success-screen{text-align:center;padding:20px 0 10px;}
.success-icon{font-size:64px;margin-bottom:12px;}
.success-title{font-family:'Fredoka One',cursive;font-size:26px;color:#1D9E75;margin-bottom:8px;}
.success-msg{font-size:14px;color:#888;line-height:1.6;margin-bottom:24px;}
.btn-fechar{width:100%;background:#1D9E75;color:#fff;border:none;border-radius:50px;padding:14px;font-family:'Fredoka One',cursive;font-size:17px;cursor:pointer;}

.cart-empty{text-align:center;padding:32px 0;color:#ccc;font-size:14px;}
.cart-empty-icon{font-size:48px;margin-bottom:8px;}
</style>
</head>
<body>

<div class="menu-wrap">
  <div class="hero">
    <div class="logo">Burguer<span>ão</span> 🍔</div>
    <div class="tagline">Sabor de verdade, feito com amor</div>
  </div>
  <div class="categories">
    <button class="cat-btn active" data-cat="burgers" onclick="filter('burgers')">🍔 Burgers</button>
    <button class="cat-btn" data-cat="porcoes" onclick="filter('porcoes')">🍟 Porções</button>
    <button class="cat-btn" data-cat="bebidas" onclick="filter('bebidas')">🥤 Bebidas</button>
    <button class="cat-btn" data-cat="sobremesas" onclick="filter('sobremesas')">🍨 Sobremesas</button>
  </div>
  <div id="menu-content"></div>
</div>

<button class="cart-bar hidden" id="cart-bar" onclick="openCart()">
  <span>🛒 Ver pedido <span class="badge" id="cart-count">0</span></span>
  <span class="cart-total" id="cart-total-bar">R$ 0,00</span>
</button>

<!-- OVERLAY CARRINHO / CHECKOUT -->
<div class="overlay" id="overlay" onclick="closeIfOutside(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-content"></div>
  </div>
</div>

<script>
const WHATSAPP = '5585996870852'; // ← TROQUE PELO NÚMERO DO ESTABELECIMENTO

const menu = {
  burgers: {
    label: '🍔 Burgers', color: '#FF4B2B',
    items: [
      {name:'Classic Smash', desc:'Blend artesanal, queijo, alface, tomate e molho especial', price:29.90, emoji:'🍔'},
      {name:'Double Bacon', desc:'Duplo blend, bacon crocante, cheddar e cebola caramelizada', price:38.90, emoji:'🥩'},
      {name:'Frango Crispy', desc:'Frango empanado crocante, maionese de alho e picles', price:27.90, emoji:'🍗'},
      {name:'Veggie Supreme', desc:'Blend de grão-de-bico, rúcula, tomate seco e cream cheese', price:28.90, emoji:'🥦'},
      {name:'BBQ Monster', desc:'Triplo blend, onion rings, molho bbq defumado', price:45.90, emoji:'🔥'},
      {name:'Kids Burguer', desc:'Mini blend, queijo e batata palha', price:19.90, emoji:'⭐'},
    ]
  },
  porcoes: {
    label: '🍟 Porções', color: '#FF9500',
    items: [
      {name:'Batata Frita', desc:'Porção crocante com sal grosso e molho cheddar', price:18.90, emoji:'🍟'},
      {name:'Onion Rings', desc:'Anéis de cebola empanados com molho ranch', price:21.90, emoji:'🧅'},
      {name:'Nuggets (10un)', desc:'Frango crocante com molho barbecue', price:22.90, emoji:'🍗'},
      {name:'Batata Rústica', desc:'Temperada com páprica defumada e ervas', price:20.90, emoji:'🥔'},
    ]
  },
  bebidas: {
    label: '🥤 Bebidas', color: '#00B4D8',
    items: [
      {name:'Milk Shake', desc:'Chocolate, morango ou baunilha — 400ml', price:18.90, emoji:'🥛'},
      {name:'Coca-Cola', desc:'Gelada 350ml', price:7.90, emoji:'🥤'},
      {name:'Suco Natural', desc:'Laranja, maracujá ou limão — 400ml', price:12.90, emoji:'🍊'},
      {name:'Água com Gás', desc:'500ml bem gelada', price:5.90, emoji:'💧'},
    ]
  },
  sobremesas: {
    label: '🍨 Sobremesas', color: '#FF6B9D',
    items: [
      {name:'Brownie Quente', desc:'Com sorvete de creme e calda de chocolate', price:19.90, emoji:'🍫'},
      {name:'Açaí 500ml', desc:'Granola, banana e leite condensado', price:22.90, emoji:'🫐'},
      {name:'Sorvete Casquinha', desc:'2 bolas — chocolate ou creme', price:8.90, emoji:'🍦'},
      {name:'Waffle Doce', desc:'Com nutella, morango e chantilly', price:17.90, emoji:'🧇'},
    ]
  }
};

let cart = [];
let selectedPayment = '';

function getTotal() {
  return cart.reduce((s, i) => s + i.price * i.qty, 0);
}

function getCount() {
  return cart.reduce((s, i) => s + i.qty, 0);
}

function updateCartBar() {
  const count = getCount();
  document.getElementById('cart-count').textContent = count;
  document.getElementById('cart-total-bar').textContent = 'R$ ' + getTotal().toFixed(2).replace('.', ',');
  const bar = document.getElementById('cart-bar');
  count > 0 ? bar.classList.remove('hidden') : bar.classList.add('hidden');
}

function addItem(catKey, idx) {
  const item = menu[catKey].items[idx];
  const found = cart.find(i => i.name === item.name);
  if (found) { found.qty++; }
  else { cart.push({name: item.name, price: item.price, emoji: item.emoji, qty: 1}); }
  updateCartBar();
  const btn = event.target;
  btn.style.transform = 'scale(1.3)';
  setTimeout(() => btn.style.transform = '', 200);
}

function changeQty(name, delta) {
  const found = cart.find(i => i.name === name);
  if (!found) return;
  found.qty += delta;
  if (found.qty <= 0) cart = cart.filter(i => i.name !== name);
  updateCartBar();
  openCart();
}

function filter(cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-cat="'+cat+'"]').classList.add('active');
  render(cat);
}

function render(cat) {
  const data = menu[cat];
  let html = '<div class="section-title">'+data.label+'</div><div class="items-grid">';
  data.items.forEach(function(item, idx) {
    html += '<div class="item-card">'
      + '<div class="item-img '+cat+'">'+item.emoji+'</div>'
      + '<div class="item-info">'
      + '<div class="item-name">'+item.name+'</div>'
      + '<div class="item-desc">'+item.desc+'</div>'
      + '<div class="item-bottom">'
      + '<div class="item-price">R$ '+item.price.toFixed(2).replace('.',',')+'</div>'
      + '<button class="add-btn" style="background:'+data.color+'" onclick="addItem(\''+cat+'\','+idx+')">+</button>'
      + '</div></div></div>';
  });
  html += '</div>';
  document.getElementById('menu-content').innerHTML = html;
}

function openCart() {
  selectedPayment = '';
  const overlay = document.getElementById('overlay');
  overlay.classList.add('open');
  renderCart();
}

function closeCart() {
  document.getElementById('overlay').classList.remove('open');
}

function closeIfOutside(e) {
  if (e.target === document.getElementById('overlay')) closeCart();
}

function selectPayment(method) {
  selectedPayment = method;
  document.querySelectorAll('.pay-opt').forEach(el => el.classList.remove('selected'));
  document.getElementById('pay-'+method).classList.add('selected');
}

function renderCart() {
  let html = '';
  if (cart.length === 0) {
    html = '<div class="sheet-title">Seu pedido</div>'
      + '<div class="cart-empty"><div class="cart-empty-icon">🛒</div>Nenhum item adicionado ainda</div>';
    document.getElementById('sheet-content').innerHTML = html;
    return;
  }

  html += '<div class="sheet-title">Seu pedido</div>';
  html += '<div class="sheet-subtitle">Confira os itens antes de finalizar</div>';

  cart.forEach(function(item) {
    const sub = (item.price * item.qty).toFixed(2).replace('.', ',');
    html += '<div class="cart-item">'
      + '<div class="cart-item-emoji">'+item.emoji+'</div>'
      + '<div class="cart-item-info">'
      + '<div class="cart-item-name">'+item.name+'</div>'
      + '<div class="cart-item-price">R$ '+sub+'</div>'
      + '<div class="cart-item-qty">'
      + '<button class="qty-btn" onclick="changeQty(\''+item.name+'\',-1)">−</button>'
      + '<span class="qty-num">'+item.qty+'</span>'
      + '<button class="qty-btn" onclick="changeQty(\''+item.name+'\',1)">+</button>'
      + '</div></div></div>';
  });

  html += '<div class="total-row"><span class="total-label">Total</span><span class="total-value">R$ '+getTotal().toFixed(2).replace('.', ',')+'</span></div>';

  html += '<div class="pay-title">Forma de pagamento</div>';
  html += '<div class="pay-options">'
    + payOpt('pix', '💠', 'PIX')
    + payOpt('dinheiro', '💵', 'Dinheiro')
    + payOpt('credito', '💳', 'Crédito')
    + payOpt('debito', '🏧', 'Débito')
    + '</div>';

  html += '<label class="input-label">Seu nome</label>';
  html += '<input class="input-field" id="nome-cliente" type="text" placeholder="Ex: João Silva">';

  html += '<label class="input-label">Observações (opcional)</label>';
  html += '<input class="input-field" id="obs-pedido" type="text" placeholder="Ex: sem cebola, ponto da carne...">';

  html += '<button class="btn-finalizar" onclick="finalizar()">Finalizar pedido via WhatsApp 🚀</button>';

  document.getElementById('sheet-content').innerHTML = html;
}

function payOpt(id, icon, label) {
  return '<div class="pay-opt" id="pay-'+id+'" onclick="selectPayment(\''+id+'\')"><span class="pay-opt-icon">'+icon+'</span><span class="pay-opt-label">'+label+'</span></div>';
}

function finalizar() {
  const nome = document.getElementById('nome-cliente').value.trim();
  const obs = document.getElementById('obs-pedido').value.trim();

  if (!nome) { alert('Por favor, informe seu nome!'); return; }
  if (!selectedPayment) { alert('Por favor, selecione a forma de pagamento!'); return; }

  const payLabels = {pix:'PIX', dinheiro:'Dinheiro', credito:'Cartão de Crédito', debito:'Cartão de Débito'};

  let msg = '🍔 *Novo Pedido — Burguerão*\n\n';
  msg += '👤 *Cliente:* ' + nome + '\n\n';
  msg += '📋 *Itens:*\n';
  cart.forEach(function(item) {
    msg += '• ' + item.qty + 'x ' + item.name + ' — R$ ' + (item.price * item.qty).toFixed(2).replace('.', ',') + '\n';
  });
  msg += '\n💰 *Total:* R$ ' + getTotal().toFixed(2).replace('.', ',');
  msg += '\n💳 *Pagamento:* ' + payLabels[selectedPayment];
  if (obs) msg += '\n📝 *Obs:* ' + obs;

  const url = 'https://wa.me/' + WHATSAPP + '?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');

  cart = [];
  updateCartBar();

  document.getElementById('sheet-content').innerHTML =
    '<div class="success-screen">'
    + '<div class="success-icon">🎉</div>'
    + '<div class="success-title">Pedido enviado!</div>'
    + '<div class="success-msg">Seu pedido foi enviado via WhatsApp.<br>Aguarde a confirmação do estabelecimento!</div>'
    + '<button class="btn-fechar" onclick="closeCart()">Voltar ao cardápio</button>'
    + '</div>';
}

render('burgers');
</script>
</body>
</html>
